# Default values for filex — a minimal install: one filex pod, SQLite on a PVC,
# an Ingress. Enable the toggles below (or use values-full.yaml) for Postgres,
# Redis and OnlyOffice.

image:
  repository: ghcr.io/brf-tech/filex
  tag: ""                 # defaults to .Chart.appVersion
  pullPolicy: IfNotPresent

# The external URL users open. REQUIRED — it is baked into share links, the OIDC
# redirect and OnlyOffice callbacks. Usually https://<ingress.host>.
publicURL: "https://files.example.com"

replicaCount: 1

service:
  type: ClusterIP
  port: 5212

ingress:
  enabled: true
  className: ""           # e.g. "nginx"
  host: files.example.com
  # TLS secret name (e.g. issued by cert-manager). Empty = no TLS block.
  tlsSecretName: ""
  annotations: {}
    # Large uploads + websockets on nginx-ingress:
    # nginx.ingress.kubernetes.io/proxy-body-size: "5g"
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "600"

# /data holds the SQLite DB (if used), the search index and the thumbnail cache.
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# Database. Default is SQLite on the PVC. For an external DB set driver +
# dsn; or set postgresql.enabled=true to run a bundled Postgres.
database:
  driver: sqlite          # sqlite | postgres | mysql
  dsn: ""                 # external DSN (postgres://… / user:pass@tcp(host)/db)

postgresql:
  enabled: false          # deploy a bundled single-instance Postgres
  image: postgres:16-alpine
  password: change-me-postgres
  storage: 8Gi

# Queue. Default sqlite (shares the DB). Redis enables distributed workers.
queue:
  driver: sqlite          # sqlite | postgres | redis
  dsn: ""

redis:
  enabled: false          # deploy a bundled single-instance Redis for the queue
  image: redis:7-alpine

# ── External integrations ───────────────────────────────────────────────
# Each is toggled with `enabled`. The chart wires filex to the service; run the
# service itself (its own chart / Deployment) and give its browser-facing
# `url` an Ingress + DNS. Set enabled=false to hide the feature in filex — e.g.
# drop OnlyOffice later by flipping one flag.

# OnlyOffice — edit Word / Excel / PowerPoint in the browser.
onlyoffice:
  enabled: false
  url: ""                 # https://office.example.com — browser-facing
  jwtSecret: ""           # MUST equal the Document Server's JWT_SECRET

# Drawio / diagrams.net — diagram editing, embedded as an iframe.
drawio:
  enabled: false
  url: ""                 # https://draw.example.com (self-host jgraph/drawio)

# Universal file converter (p2r3/convert fork, in-browser WASM). No public
# image is published yet — see docs/CONVERT-INTEGRATION.md.
convert:
  enabled: false
  url: ""                 # https://files.example.com/convert

# Mermaid diagrams render in the browser with no service — always available.

# ── Bundled MinIO (S3-compatible storage) ───────────────────────────────
# Deploys an internal MinIO. After install, add it as an S3 storage in the
# admin UI: endpoint=http://<release>-minio:9000, path_style=true, region=auto.
minio:
  enabled: false
  image: minio/minio:latest
  rootUser: filex
  rootPassword: change-me-minio
  storage: 20Gi

# Any extra FILEX_* overrides (see docs/CONFIGURATION.md).
extraEnv: {}
  # FILEX_LOG_LEVEL: debug
  # FILEX_OIDC_ISSUER: https://id.example.com/realms/main

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits: {}

nodeSelector: {}
tolerations: []
affinity: {}
podSecurityContext: {}
securityContext: {}
