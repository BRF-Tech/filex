apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "filex.fullname" . }}
  labels:
    {{- include "filex.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate            # single PVC (RWO) — avoid two pods mounting it
  selector:
    matchLabels:
      {{- include "filex.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "filex.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/env: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: filex
          image: {{ include "filex.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ include "filex.fullname" . }}-env
          ports:
            - name: http
              containerPort: 5212
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if and (eq .Values.storage.type "local") (ne .Values.storage.local.volume.type "data") }}
            - name: storage-files
              mountPath: /srv/files
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "filex.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if and (eq .Values.storage.type "local") (ne .Values.storage.local.volume.type "data") }}
        - name: storage-files
          {{- if eq .Values.storage.local.volume.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ include "filex.fullname" . }}-storage
          {{- else if eq .Values.storage.local.volume.type "nfs" }}
          nfs:
            server: {{ required "storage.local.volume.nfsServer is required for nfs" .Values.storage.local.volume.nfsServer | quote }}
            path: {{ required "storage.local.volume.nfsPath is required for nfs" .Values.storage.local.volume.nfsPath | quote }}
          {{- else if eq .Values.storage.local.volume.type "hostPath" }}
          hostPath:
            path: {{ required "storage.local.volume.hostPath is required for hostPath" .Values.storage.local.volume.hostPath | quote }}
            type: DirectoryOrCreate
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
