apiVersion: v1
kind: Secret
metadata:
  name: {{ include "filex.fullname" . }}-env
  labels:
    {{- include "filex.labels" . | nindent 4 }}
type: Opaque
stringData:
  FILEX_PUBLIC_URL: {{ required "publicURL is required" .Values.publicURL | quote }}
  FILEX_LISTEN: "0.0.0.0:5212"
  FILEX_DATA_DIR: "/data"
  FILEX_THUMBS_ENABLED: "true"
  {{- if .Values.postgresql.enabled }}
  FILEX_DB_DRIVER: "postgres"
  FILEX_DB_DSN: "postgres://filex:{{ .Values.postgresql.password }}@{{ include "filex.fullname" . }}-postgres:5432/filex?sslmode=disable"
  {{- else if ne .Values.database.driver "sqlite" }}
  FILEX_DB_DRIVER: {{ .Values.database.driver | quote }}
  FILEX_DB_DSN: {{ .Values.database.dsn | quote }}
  {{- else }}
  FILEX_DB_DRIVER: "sqlite"
  {{- end }}
  {{- if .Values.redis.enabled }}
  FILEX_QUEUE_DRIVER: "redis"
  FILEX_QUEUE_DSN: "redis://{{ include "filex.fullname" . }}-redis:6379/0"
  {{- else if ne .Values.queue.driver "sqlite" }}
  FILEX_QUEUE_DRIVER: {{ .Values.queue.driver | quote }}
  FILEX_QUEUE_DSN: {{ .Values.queue.dsn | quote }}
  {{- end }}
  {{- if and .Values.onlyoffice.enabled .Values.onlyoffice.url }}
  FILEX_ONLYOFFICE_URL: {{ .Values.onlyoffice.url | quote }}
  FILEX_ONLYOFFICE_JWT: {{ .Values.onlyoffice.jwtSecret | quote }}
  {{- end }}
  {{- if and .Values.drawio.enabled .Values.drawio.url }}
  FILEX_DRAWIO_URL: {{ .Values.drawio.url | quote }}
  {{- end }}
  {{- if and .Values.convert.enabled .Values.convert.url }}
  FILEX_CONVERT_URL: {{ .Values.convert.url | quote }}
  {{- end }}
  {{- if .Values.auth.drivers }}
  FILEX_AUTH_DRIVERS: {{ .Values.auth.drivers | quote }}
  {{- end }}
  {{- with .Values.auth.oidc }}
  {{- if .issuer }}
  FILEX_OIDC_ISSUER: {{ .issuer | quote }}
  FILEX_OIDC_CLIENT_ID: {{ .clientId | quote }}
  FILEX_OIDC_CLIENT_SECRET: {{ .clientSecret | quote }}
  FILEX_OIDC_REDIRECT_URL: {{ .redirectURL | default (printf "%s/api/auth/oidc/callback" $.Values.publicURL) | quote }}
  {{- if .roleClaim }}
  FILEX_OIDC_ROLE_CLAIM: {{ .roleClaim | quote }}
  {{- end }}
  {{- if .adminGroup }}
  FILEX_OIDC_ADMIN_GROUP: {{ .adminGroup | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- if .Values.admin.email }}
  FILEX_ADMIN_EMAIL: {{ .Values.admin.email | quote }}
  {{- end }}
  {{- if .Values.admin.password }}
  FILEX_ADMIN_PASSWORD: {{ .Values.admin.password | quote }}
  {{- end }}
  {{- if .Values.smtp.host }}
  FILEX_SMTP_HOST: {{ .Values.smtp.host | quote }}
  FILEX_SMTP_PORT: {{ .Values.smtp.port | quote }}
  FILEX_SMTP_USERNAME: {{ .Values.smtp.username | quote }}
  FILEX_SMTP_PASSWORD: {{ .Values.smtp.password | quote }}
  FILEX_SMTP_FROM: {{ .Values.smtp.from | quote }}
  FILEX_SMTP_TLS: {{ .Values.smtp.tls | quote }}
  {{- end }}
  {{- if .Values.siteName }}
  FILEX_SITE_NAME: {{ .Values.siteName | quote }}
  {{- end }}
  {{- if .Values.trashRetentionDays }}
  FILEX_TRASH_RETENTION_DAYS: {{ .Values.trashRetentionDays | quote }}
  {{- end }}
  {{- if eq .Values.storage.type "local" }}
  FILEX_DEFAULT_STORAGE_DRIVER: "local"
  FILEX_DEFAULT_STORAGE_NAME: {{ .Values.storage.name | quote }}
  FILEX_DEFAULT_STORAGE_MOUNT: {{ .Values.storage.mountPath | quote }}
  {{- if eq .Values.storage.local.volume.type "data" }}
  FILEX_DEFAULT_STORAGE_PATH: "/data/files"
  {{- else }}
  FILEX_DEFAULT_STORAGE_PATH: "/srv/files"
  {{- end }}
  {{- else if eq .Values.storage.type "s3" }}
  FILEX_DEFAULT_STORAGE_DRIVER: "s3"
  FILEX_DEFAULT_STORAGE_NAME: {{ .Values.storage.name | quote }}
  FILEX_DEFAULT_STORAGE_MOUNT: {{ .Values.storage.mountPath | quote }}
  FILEX_DEFAULT_STORAGE_S3_BUCKET: {{ .Values.storage.s3.bucket | quote }}
  FILEX_DEFAULT_STORAGE_S3_PREFIX: {{ .Values.storage.s3.prefix | quote }}
  FILEX_DEFAULT_STORAGE_S3_REGION: {{ .Values.storage.s3.region | quote }}
  FILEX_DEFAULT_STORAGE_S3_PATH_STYLE: {{ .Values.storage.s3.pathStyle | quote }}
  {{- if .Values.storage.s3.endpoint }}
  FILEX_DEFAULT_STORAGE_S3_ENDPOINT: {{ .Values.storage.s3.endpoint | quote }}
  {{- else if .Values.minio.enabled }}
  FILEX_DEFAULT_STORAGE_S3_ENDPOINT: "http://{{ include "filex.fullname" . }}-minio:9000"
  {{- end }}
  {{- if .Values.storage.s3.accessKey }}
  FILEX_DEFAULT_STORAGE_S3_ACCESS_KEY: {{ .Values.storage.s3.accessKey | quote }}
  {{- else if .Values.minio.enabled }}
  FILEX_DEFAULT_STORAGE_S3_ACCESS_KEY: {{ .Values.minio.rootUser | quote }}
  {{- end }}
  {{- if .Values.storage.s3.secretKey }}
  FILEX_DEFAULT_STORAGE_S3_SECRET_KEY: {{ .Values.storage.s3.secretKey | quote }}
  {{- else if .Values.minio.enabled }}
  FILEX_DEFAULT_STORAGE_S3_SECRET_KEY: {{ .Values.minio.rootPassword | quote }}
  {{- end }}
  {{- else if .Values.storage.config }}
  FILEX_DEFAULT_STORAGE_DRIVER: {{ .Values.storage.type | quote }}
  FILEX_DEFAULT_STORAGE_NAME: {{ .Values.storage.name | quote }}
  FILEX_DEFAULT_STORAGE_MOUNT: {{ .Values.storage.mountPath | quote }}
  FILEX_DEFAULT_STORAGE_CONFIG: {{ .Values.storage.config | toJson | quote }}
  {{- end }}
  {{- range $k, $v := .Values.extraEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
