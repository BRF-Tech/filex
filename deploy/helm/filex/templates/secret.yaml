apiVersion: v1
kind: Secret
metadata:
  name: {{ include "filex.fullname" . }}-env
  labels:
    {{- include "filex.labels" . | nindent 4 }}
type: Opaque
stringData:
  FILEX_PUBLIC_URL: {{ required "publicURL is required" .Values.publicURL | quote }}
  FILEX_LISTEN: "0.0.0.0:5212"
  FILEX_DATA_DIR: "/data"
  FILEX_THUMBS_ENABLED: "true"
  {{- if .Values.postgresql.enabled }}
  FILEX_DB_DRIVER: "postgres"
  FILEX_DB_DSN: "postgres://filex:{{ .Values.postgresql.password }}@{{ include "filex.fullname" . }}-postgres:5432/filex?sslmode=disable"
  {{- else if ne .Values.database.driver "sqlite" }}
  FILEX_DB_DRIVER: {{ .Values.database.driver | quote }}
  FILEX_DB_DSN: {{ .Values.database.dsn | quote }}
  {{- else }}
  FILEX_DB_DRIVER: "sqlite"
  {{- end }}
  {{- if .Values.redis.enabled }}
  FILEX_QUEUE_DRIVER: "redis"
  FILEX_QUEUE_DSN: "redis://{{ include "filex.fullname" . }}-redis:6379/0"
  {{- else if ne .Values.queue.driver "sqlite" }}
  FILEX_QUEUE_DRIVER: {{ .Values.queue.driver | quote }}
  FILEX_QUEUE_DSN: {{ .Values.queue.dsn | quote }}
  {{- end }}
  {{- if and .Values.onlyoffice.enabled .Values.onlyoffice.url }}
  FILEX_ONLYOFFICE_URL: {{ .Values.onlyoffice.url | quote }}
  FILEX_ONLYOFFICE_JWT: {{ .Values.onlyoffice.jwtSecret | quote }}
  {{- end }}
  {{- if and .Values.drawio.enabled .Values.drawio.url }}
  FILEX_DRAWIO_URL: {{ .Values.drawio.url | quote }}
  {{- end }}
  {{- if and .Values.convert.enabled .Values.convert.url }}
  FILEX_CONVERT_URL: {{ .Values.convert.url | quote }}
  {{- end }}
  {{- range $k, $v := .Values.extraEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
