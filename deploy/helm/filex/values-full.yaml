# Full install: bundled Postgres + Redis + MinIO, plus external OnlyOffice and
# Drawio wired in. Every add-on is a toggle — flip `enabled` to add/remove it.
#
# Usage:
#   helm install filex ./deploy/helm/filex -f deploy/helm/filex/values-full.yaml \
#     --set ingress.host=files.example.com \
#     --set publicURL=https://files.example.com

# ── Bundled data services (deployed by this chart) ──────────────────────
postgresql:
  enabled: true
  password: change-me-postgres     # override with --set or a sealed secret

queue:
  driver: redis

redis:
  enabled: true

minio:
  enabled: true
  rootPassword: change-me-minio

# Seed the bundled MinIO as the default storage on first boot — endpoint +
# credentials are auto-filled from the minio block above, so files have a home
# with zero admin-UI clicks.
storage:
  type: s3
  s3:
    bucket: filex
    prefix: files

# ── Zero-touch SSO (uncomment + fill to stand up OIDC with no UI clicks) ──
# auth:
#   drivers: "local,oidc"
#   oidc:
#     issuer: https://id.example.com/realms/main
#     clientId: filex
#     clientSecret: change-me-oidc
#     roleClaim: realm_access.roles
#     adminGroup: filex-admin
# admin:
#   email: admin@example.com
#   password: change-me-admin
# smtp:
#   host: smtp.example.com
#   from: no-reply@example.com

# ── External integrations (run separately; the chart wires filex) ───────
# Flip enabled=false to remove one later (e.g. drop OnlyOffice tomorrow).
onlyoffice:
  enabled: true
  url: https://office.example.com   # deploy a Document Server separately
  jwtSecret: change-me-onlyoffice   # must match the Document Server's JWT_SECRET

drawio:
  enabled: true
  url: https://draw.example.com     # self-host jgraph/drawio

convert:
  enabled: false                    # no public image yet — see docs/CONVERT-INTEGRATION.md
  url: ""

# Mermaid needs nothing — it renders in the browser.
