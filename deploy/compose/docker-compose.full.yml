# filex — full stack (production-shaped) with toggleable integrations.
#
# Always-on core:  filex + PostgreSQL (DB) + Redis (queue) + Caddy (HTTPS proxy)
# Opt-in add-ons:  OnlyOffice · Drawio · universal Converter · MinIO (S3)
#
# ── Toggling add-ons ────────────────────────────────────────────────────
# Every add-on is a Compose *profile*. Turn one on/off in your .env by editing
# COMPOSE_PROFILES (comma list) together with the matching FILEX_*_URL:
#
#   COMPOSE_PROFILES=onlyoffice,drawio,minio     # (convert left out → off)
#
# To drop OnlyOffice tomorrow: remove `onlyoffice` from COMPOSE_PROFILES and
# blank FILEX_ONLYOFFICE_URL, then:
#   docker compose -f docker-compose.full.yml --env-file .env up -d --remove-orphans
#
# Mermaid needs no service — filex renders .mmd / .mermaid in the browser.
#
# 1. cp .env.example .env   &&   edit domains + secrets + COMPOSE_PROFILES
# 2. Point DNS for every ENABLED domain at this host (80/443 open for HTTPS).
# 3. docker compose -f docker-compose.full.yml --env-file .env up -d
# 4. docker compose -f docker-compose.full.yml logs -f filex   # first-run admin creds
#
# Then add an S3 storage in the admin UI backed by the bundled MinIO:
#   driver=s3, endpoint=http://minio:9000, path_style=true, region=auto,
#   bucket=<your bucket>, prefix=filex, access_key/secret_key = MINIO_ROOT_*.

services:
  filex:
    image: ghcr.io/brf-tech/filex:latest       # full image (thumbnails included)
    environment:
      FILEX_PUBLIC_URL: https://${FILEX_DOMAIN}
      FILEX_DB_DRIVER: postgres
      FILEX_DB_DSN: postgres://filex:${POSTGRES_PASSWORD}@postgres:5432/filex?sslmode=disable
      FILEX_QUEUE_DRIVER: redis
      FILEX_QUEUE_DSN: redis://redis:6379/0
      FILEX_THUMBS_ENABLED: "true"
      # External integrations — each is blank unless you enable it (see header).
      # filex hides an integration whose URL is blank or unreachable.
      FILEX_ONLYOFFICE_URL: ${FILEX_ONLYOFFICE_URL:-}
      FILEX_ONLYOFFICE_JWT: ${ONLYOFFICE_JWT_SECRET:-}
      FILEX_DRAWIO_URL: ${FILEX_DRAWIO_URL:-}
      FILEX_CONVERT_URL: ${FILEX_CONVERT_URL:-}
      # ── Zero-touch config (seeded on first boot; fill in .env) ──────────
      # SSO: set FILEX_AUTH_DRIVERS=local,oidc + the FILEX_OIDC_* vars.
      FILEX_AUTH_DRIVERS: ${FILEX_AUTH_DRIVERS:-local}
      FILEX_OIDC_ISSUER: ${FILEX_OIDC_ISSUER:-}
      FILEX_OIDC_CLIENT_ID: ${FILEX_OIDC_CLIENT_ID:-}
      FILEX_OIDC_CLIENT_SECRET: ${FILEX_OIDC_CLIENT_SECRET:-}
      FILEX_OIDC_REDIRECT_URL: ${FILEX_OIDC_REDIRECT_URL:-}
      FILEX_OIDC_ROLE_CLAIM: ${FILEX_OIDC_ROLE_CLAIM:-}
      FILEX_OIDC_ADMIN_GROUP: ${FILEX_OIDC_ADMIN_GROUP:-}
      FILEX_ADMIN_EMAIL: ${FILEX_ADMIN_EMAIL:-}
      FILEX_ADMIN_PASSWORD: ${FILEX_ADMIN_PASSWORD:-}
      FILEX_SMTP_HOST: ${FILEX_SMTP_HOST:-}
      FILEX_SMTP_PORT: ${FILEX_SMTP_PORT:-587}
      FILEX_SMTP_USERNAME: ${FILEX_SMTP_USERNAME:-}
      FILEX_SMTP_PASSWORD: ${FILEX_SMTP_PASSWORD:-}
      FILEX_SMTP_FROM: ${FILEX_SMTP_FROM:-}
      FILEX_SMTP_TLS: ${FILEX_SMTP_TLS:-starttls}
      FILEX_SITE_NAME: ${FILEX_SITE_NAME:-}
      FILEX_TRASH_RETENTION_DAYS: ${FILEX_TRASH_RETENTION_DAYS:-}
      # Default storage seeded on first boot. Default = a local folder on the
      # ./files bind-mount. Switch to the bundled MinIO by setting DRIVER=s3 +
      # the S3 vars in .env and enabling the minio profile (minio-init creates
      # the bucket).
      FILEX_DEFAULT_STORAGE_DRIVER: ${FILEX_DEFAULT_STORAGE_DRIVER:-local}
      FILEX_DEFAULT_STORAGE_PATH: ${FILEX_DEFAULT_STORAGE_PATH:-/srv/files}
      # Connect an existing external storage of any driver (sftp/webdav/ftp):
      # set DRIVER + this raw JSON config. See .env.example.
      FILEX_DEFAULT_STORAGE_CONFIG: ${FILEX_DEFAULT_STORAGE_CONFIG:-}
      FILEX_DEFAULT_STORAGE_S3_BUCKET: ${FILEX_DEFAULT_STORAGE_S3_BUCKET:-}
      FILEX_DEFAULT_STORAGE_S3_PREFIX: ${FILEX_DEFAULT_STORAGE_S3_PREFIX:-files}
      FILEX_DEFAULT_STORAGE_S3_ENDPOINT: ${FILEX_DEFAULT_STORAGE_S3_ENDPOINT:-}
      FILEX_DEFAULT_STORAGE_S3_REGION: ${FILEX_DEFAULT_STORAGE_S3_REGION:-auto}
      FILEX_DEFAULT_STORAGE_S3_ACCESS_KEY: ${FILEX_DEFAULT_STORAGE_S3_ACCESS_KEY:-}
      FILEX_DEFAULT_STORAGE_S3_SECRET_KEY: ${FILEX_DEFAULT_STORAGE_S3_SECRET_KEY:-}
      FILEX_DEFAULT_STORAGE_S3_PATH_STYLE: ${FILEX_DEFAULT_STORAGE_S3_PATH_STYLE:-true}
    volumes:
      - filex-data:/data          # DB (if you switch to sqlite), search index, thumbs, first-run secret
      - ./files:/srv/files        # default local storage folder (seeded on boot)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: filex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: filex
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filex"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      FILEX_DOMAIN: ${FILEX_DOMAIN}
      # Add-on domains fall back to *.localhost (self-signed, never reached) when
      # you don't run that add-on — no public cert is requested for it.
      ONLYOFFICE_DOMAIN: ${ONLYOFFICE_DOMAIN:-onlyoffice.localhost}
      DRAWIO_DOMAIN: ${DRAWIO_DOMAIN:-drawio.localhost}
      MINIO_CONSOLE_DOMAIN: ${MINIO_CONSOLE_DOMAIN:-minio.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - filex
    restart: unless-stopped

  # ── Opt-in add-ons (Compose profiles) ──────────────────────────────────
  onlyoffice:
    image: onlyoffice/documentserver:latest
    profiles: ["onlyoffice"]
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}     # must match FILEX_ONLYOFFICE_JWT
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
    restart: unless-stopped

  drawio:
    image: jgraph/drawio:latest
    profiles: ["drawio"]
    environment:
      DRAWIO_SELF_CONTAINED: "1"
    restart: unless-stopped

  convert:
    # filex embeds the p2r3/convert universal converter (GPL-2.0, in-browser
    # WASM) in a hidden iframe. No public image is published yet — build the
    # fork per docs/CONVERT-INTEGRATION.md and set CONVERT_IMAGE, or point
    # FILEX_CONVERT_URL at your own deployment. Caddy serves it under /convert.
    image: ${CONVERT_IMAGE:-ghcr.io/brf-tech/filex-convert:latest}
    profiles: ["convert"]
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    profiles: ["minio"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    restart: unless-stopped

  # One-shot: create the default bucket in the bundled MinIO so an s3 default
  # storage seeds cleanly. Runs only with the minio profile.
  minio-init:
    image: minio/mc:latest
    profiles: ["minio"]
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BUCKET: ${FILEX_DEFAULT_STORAGE_S3_BUCKET:-filex}
    entrypoint: ["/bin/sh", "-c", "until mc alias set m http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do sleep 2; done; mc mb -p \"m/$$BUCKET\"; echo bucket ready"]
    restart: "no"

volumes:
  filex-data:
  postgres-data:
  redis-data:
  onlyoffice-data:
  minio-data:
  caddy-data:
  caddy-config:
