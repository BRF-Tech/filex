name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      # backend/embed/{admin,web} are git-ignored — the real bytes come from
      # the frontend build. `//go:embed all:admin all:web` fails to resolve on
      # empty dirs, so drop a placeholder for vet/test/build.
      - name: Embed placeholders
        run: |
          mkdir -p backend/embed/admin backend/embed/web
          touch backend/embed/admin/.placeholder backend/embed/web/.placeholder
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: Test
        working-directory: backend
        run: go test ./...
      - name: Build
        working-directory: backend
        run: go build ./...

  frontend:
    name: Frontend (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.12.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build packages + admin UI
        env:
          # vue-tsc needs headroom on the full component bundle.
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          pnpm -r --filter='./packages/*' build
          pnpm --filter='./web' build
      - name: Unit tests
        run: pnpm --filter='./web' --filter='./packages/*' test

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build the full image end-to-end (frontend + backend + embed) to catch
      # multi-stage regressions. No push — release publishing is separate.
      - name: Build image
        run: docker build -f docker/Dockerfile -t filex:ci .
