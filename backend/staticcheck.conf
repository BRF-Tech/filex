# staticcheck configuration for the filex backend.
#
# `checks` is the master allow/deny list. We start from `all` (every
# rule staticcheck ships) and then opt out of two cosmetic style
# diagnostics that flag generated/embed-shim packages we can't rename
# without breaking the build:
#
#   - ST1000: "at least one file in a package should have a package
#     comment". Triggers on `internal/model/*.go` and a handful of
#     other packages where the comment lives on the type rather than
#     above the package clause. Cosmetic — bug detection rules in the
#     SA family still cover real issues.
#
#   - ST1003: "should not use underscores in package names". Flags the
#     embed shim packages `db/migrations/{mysql,postgres,sqlite}` (the
#     paths come from goose's migration directory layout — renaming
#     would break the `embed.FS` glob). Cosmetic.
#
# SA1019 (deprecated APIs) is intentionally ENABLED — the previous
# `BRPopLPush` / `ZRangeByScore` waivers were dropped after migrating
# `internal/queue/drivers/redis/redis.go` to `BLMove` / `ZRangeArgs`.
checks = ["all", "-ST1000", "-ST1003"]
