version: "2"
sql:
  - engine: "sqlite"
    queries: "db/queries/"
    schema: "db/migrations/sqlite/"
    gen:
      go:
        out: "internal/db/drivers/sqlite/queries"
        package: "queries"
        emit_interface: true
        emit_json_tags: true
        emit_prepared_queries: false
        emit_exact_table_names: false
  - engine: "postgresql"
    queries: "db/queries/"
    schema: "db/migrations/postgres/"
    gen:
      go:
        out: "internal/db/drivers/postgres/queries"
        package: "queries"
        emit_interface: true
        emit_json_tags: true
        emit_prepared_queries: false
        emit_exact_table_names: false
  - engine: "mysql"
    queries: "db/queries/"
    schema: "db/migrations/mysql/"
    gen:
      go:
        out: "internal/db/drivers/mysql/queries"
        package: "queries"
        emit_interface: true
        emit_json_tags: true
        emit_prepared_queries: false
        emit_exact_table_names: false
