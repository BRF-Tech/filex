# --- Docker images ---
# We build Docker images in a separate GitLab CI job (release:docker) using
# the in-tree Dockerfiles, because:
#   1. We need a Node toolchain to build npm packages + admin UI.
#   2. goreleaser's docker target would require us to copy embed assets into
#      a context that the Dockerfile can see, which is identical to what the
#      multi-stage Dockerfile already does itself.
# If you want to switch to goreleaser-driven Docker builds later:
#
# dockers:
#   - image_templates:
#       - "ghcr.io/brf-tech/filex:slim-{{ .Tag }}-amd64"
#     dockerfile: docker/Dockerfile
#     use: buildx
#     build_flag_templates:
#       - "--platform=linux/amd64"
#       - "--label=org.opencontainers.image.source=https://github.com/brf-tech/filex"
#       - "--label=org.opencontainers.image.version={{ .Version }}"
